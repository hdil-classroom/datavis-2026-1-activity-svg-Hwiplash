<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
			margin-bottom: 12px;
		}

		#visualization-activity {
			width: 700px;
			height: 500px;
			border: 1px solid #d9d9d9;
			background: #ffffff;
		}

		.axis {
			stroke: #000000;
			stroke-width: 1.5;
		}

		.axis-label {
			font-size: 12px;
			fill: #000000;
		}

		.tick-label {
			font-size: 10px;
			fill: #000000;
		}

		.bar {
			fill: #8b8b8b;
		}

		.bar.line1 {
			fill: #1025c2;
		}

		.bar.line3 {
			fill: #ec882b;
		}

		.bar.line2 {
			fill: #20bf6b;
		}

		.station-label {
			font-size: 11px;
			fill: #222222;
			text-anchor: middle;
		}


	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Activity by Hwirin Song
	</h1>

	<svg id="visualization-activity">
		<g id="bar-chart" transform="translate(20, 20)">

			<g id="axes" transform="translate(0, 30)">
				<line class="axis" x1="70" y1="380" x2="70" y2="60"></line>
				<line class="axis" x1="70" y1="380" x2="560" y2="380"></line>
				<line class="axis" x1="64" y1="380" x2="70" y2="380"></line>
				<text class="tick-label" x="58" y="383" text-anchor="end">0</text>
				<line class="axis" x1="64" y1="340" x2="70" y2="340"></line>
				<text class="tick-label" x="58" y="343" text-anchor="end">10000</text>
				<line class="axis" x1="64" y1="300" x2="70" y2="300"></line>
				<text class="tick-label" x="58" y="303" text-anchor="end">20000</text>
				<line class="axis" x1="64" y1="260" x2="70" y2="260"></line>
				<text class="tick-label" x="58" y="263" text-anchor="end">30000</text>
				<line class="axis" x1="64" y1="220" x2="70" y2="220"></line>
				<text class="tick-label" x="58" y="223" text-anchor="end">40000</text>
				<line class="axis" x1="64" y1="180" x2="70" y2="180"></line>
				<text class="tick-label" x="58" y="183" text-anchor="end">50000</text>
				<line class="axis" x1="64" y1="140" x2="70" y2="140"></line>
				<text class="tick-label" x="58" y="143" text-anchor="end">60000</text>
				<line class="axis" x1="64" y1="100" x2="70" y2="100"></line>
				<text class="tick-label" x="58" y="103" text-anchor="end">70000</text>
				<line class="axis" x1="64" y1="60" x2="70" y2="60"></line>
				<text class="tick-label" x="58" y="63" text-anchor="end">80000</text>
				<text class="axis-label" x="22" y="230" transform="rotate(-90 22 230)">Entry Count</text>
				<text class="axis-label" x="315" y="420" text-anchor="middle">Station Name</text>
			</g>

			<g id="bars" transform="translate(0, 30)">
				<g class="bar-group">
					<rect class="bar line2" x="95" y="89" width="55" height="291"></rect>
					<text class="station-label" x="122" y="398">홍대입구</text>
				</g>

				<g class="bar-group">
					<rect class="bar line2" x="170" y="128" width="55" height="252"></rect>
					<text class="station-label" x="197" y="398">잠실(송파구청)</text>
				</g>

				<g class="bar-group">
					<rect class="bar line3" x="245" y="166" width="55" height="214"></rect>
					<text class="station-label" x="272" y="398">고속터미널</text>
				</g>

				<g class="bar-group">
					<rect class="bar line1" x="320" y="218" width="55" height="162"></rect>
					<text class="station-label" x="347" y="398">서울역</text>
				</g>

				<g class="bar-group">
					<rect class="bar line2" x="395" y="227" width="55" height="153"></rect>
					<text class="station-label" x="422" y="398">신림</text>
				</g>

				<g class="bar-group">
					<rect class="bar line2" x="470" y="230" width="55" height="150"></rect>
					<text class="station-label" x="497" y="398">신도림</text>
				</g>
			</g>

			<g id="legend" transform="translate(570, 52)">
				<rect class="bar line1" x="0" y="-10" width="12" height="12"></rect>
				<text class="axis-label" x="18" y="0">Line 1</text>
				<rect class="bar line2" x="0" y="10" width="12" height="12"></rect>
				<text class="axis-label" x="18" y="20">Line 2</text>
				<rect class="bar line3" x="0" y="30" width="12" height="12"></rect>
				<text class="axis-label" x="18" y="40">Line 3</text>
			</g>
		</g>


	</svg>

</body>
</html>
